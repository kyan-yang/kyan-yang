<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">30-day GitHub activity specimen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet" vid="7">
    
    <style vid="8">
        :root {
            --bg-edge: #0d1117;
            --text-cream: #F0DDD8;
            --text-muted: rgba(240, 221, 216, 0.5);
            --line-subtle: rgba(240, 221, 216, 0.12);
            --ruby-glow: rgba(136, 62, 67, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-edge);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Space Mono', monospace;
            color: var(--text-cream);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .specimen-artwork {
            position: relative;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1 / 1;
            container-type: inline-size;
        }

        #gl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: var(--bg-edge);
        }

        .vignette-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: radial-gradient(
                circle at center,
                transparent 40%,
                var(--bg-edge) 95%
            );
            pointer-events: none;
        }

        .specimen-data {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            padding: 8cqw;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            pointer-events: none;
        }

        .mono-tiny {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .mono-value {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-cream);
            letter-spacing: 0.05em;
        }

        .serif-display {
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-cream);
            line-height: 1;
        }

        .header-left {
            grid-column: 1;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .header-right {
            grid-column: 2;
            grid-row: 1;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .stat-pair {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .center-display {
            grid-column: 1 / 3;
            grid-row: 1 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            pointer-events: none;
        }

        .commits-value {
            font-size: clamp(3rem, 18cqw, 8rem);
            font-weight: 300;
            font-style: italic;
            letter-spacing: -0.02em;
            margin-bottom: -6px;
            text-shadow: 0 0 30px var(--ruby-glow);
        }

        .crosshair {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: -1;
            opacity: 0.2;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: var(--line-subtle);
        }
        .crosshair::before { width: 1px; height: 100px; }
        .crosshair::after { width: 100px; height: 1px; }

        .bottom-left {
            grid-column: 1;
            grid-row: 3;
            align-self: end;
            border-left: 1px solid var(--line-subtle);
            padding-left: 10px;
        }

        .bottom-right {
            grid-column: 2;
            grid-row: 3;
            align-self: end;
            text-align: right;
            border-right: 1px solid var(--line-subtle);
            padding-right: 10px;
        }

        .data-group {
            margin-top: 12px;
        }

        .data-row {
            display: flex;
            justify-content: flex-start;
            gap: 4px;
            margin-top: 4px;
        }
        
        .language-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 8px;
        }
        .lang-item {
            display: flex;
            justify-content: space-between;
            width: 100px;
            border-bottom: 1px dotted rgba(240, 221, 216, 0.15);
            padding-bottom: 2px;
        }
        .bottom-right .lang-item {
            margin-left: auto;
        }

        .fraction-line {
            width: 100%;
            height: 1px;
            background: var(--line-subtle);
            margin: 6px 0;
        }
    </style>
</head>
<body vid="9">

    <div class="specimen-artwork" vid="10">
        <canvas id="gl-canvas" vid="11"></canvas>
        <div class="vignette-overlay" vid="12"></div>

        <div class="specimen-data" vid="13">
            <div class="header-left" vid="14">
                <div class="stat-pair" vid="15">
                    <div class="mono-tiny" vid="16">DAYS ACTIVE</div>
                    <div class="serif-display" style="font-size: 1.8rem;" vid="17">16</div>
                </div>
            </div>

            <div class="header-right" vid="19">
                <div class="stat-pair" vid="20">
                    <div class="mono-tiny" vid="21">REPOSITORIES</div>
                    <div class="serif-display" style="font-size: 1.4rem;" vid="22">9</div>
                </div>
            </div>

            <div class="center-display" vid="23">
                <div class="crosshair" vid="24"></div>
                <div class="mono-tiny" style="position: absolute; top: calc(50% - 64px); left: 50%; transform: translateX(-50%); letter-spacing: 0.2em; white-space: nowrap; font-size: 0.72rem;">PAST 30 DAYS</div>
                <div class="serif-display commits-value" vid="25">135</div>
                <div class="fraction-line" style="width: 120px;" vid="26"></div>
                <div class="mono-tiny" style="letter-spacing: 0.2em;" vid="27">COMMITS</div>
            </div>

            <div class="bottom-left" vid="28">
                <div class="data-group" vid="29">
                    <div class="data-row" vid="30">
                        <span class="mono-tiny" vid="31">[+]</span>
                        <span class="mono-value" vid="32">41,176 <span class="mono-tiny" style="color:var(--text-muted)" vid="33">ADD</span></span>
                    </div>
                    <div class="data-row" vid="34">
                        <span class="mono-tiny" vid="35">[-]</span>
                        <span class="mono-value" vid="36">22,776 <span class="mono-tiny" style="color:var(--text-muted)" vid="37">DEL</span></span>
                    </div>
                </div>
                <div class="data-group" style="margin-top: 18px;" vid="38">
                    <div class="mono-tiny" style="color: var(--text-cream);" vid="39">TOTAL LINES CHANGED</div>
                    <div class="serif-display" style="font-size: 1.3rem; margin-top: 4px;" vid="40">63,952</div>
                </div>
            </div>

            <div class="bottom-right" vid="41">
                <div class="language-list" vid="42">
                    <div class="lang-item mono-tiny">
                        <span style="color: var(--text-cream);">TYPESCRIPT</span>
                        <span>49%</span>
                    </div>
                    <div class="lang-item mono-tiny">
                        <span style="color: var(--text-cream);">PYTHON</span>
                        <span>23%</span>
                    </div>
                    <div class="lang-item mono-tiny">
                        <span style="color: var(--text-cream);">CSS</span>
                        <span>12%</span>
                    </div>
                    <div class="lang-item mono-tiny">
                        <span style="color: var(--text-cream);">OTHER</span>
                        <span>15%</span>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script vid="55">
        const canvas = document.getElementById('gl-canvas');
        const gl = canvas.getContext('webgl');
        const vsSource = `attribute vec4 aVertexPosition; void main() { gl_Position = aVertexPosition; }`;
        const fsSource = `
            precision highp float;
            uniform vec2 u_resolution;
            uniform float u_time;
            float random (in vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
            float noise (in vec2 st) {
                vec2 i = floor(st); vec2 f = fract(st);
                float a = random(i); float b = random(i + vec2(1.0, 0.0));
                float c = random(i + vec2(0.0, 1.0)); float d = random(i + vec2(1.0, 1.0));
                vec2 u = f*f*(3.0-2.0*f);
                return mix(a, b, u.x) + (c - a)* u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
            }
            #define OCTAVES 5
            float fbm (in vec2 st) {
                float value = 0.0; float amplitude = .5;
                mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.50));
                for (int i = 0; i < OCTAVES; i++) {
                    value += amplitude * noise(st); st = rot * st * 2.0 + vec2(100.0); amplitude *= .5;
                }
                return value;
            }
            void main() {
                vec2 st = gl_FragCoord.xy/u_resolution.xy; vec2 p = st * 2.0 - 1.0;
                vec2 q = vec2(fbm(p + 0.05 * u_time), fbm(p + vec2(1.0)));
                vec2 r = vec2(fbm(p + 1.5 * q + vec2(1.7, 9.2) + 0.15 * u_time), fbm(p + 1.5 * q + vec2(8.3, 2.8) + 0.126 * u_time));
                float f = fbm(p + r);
                vec3 col0 = vec3(0.051, 0.067, 0.090); vec3 col1 = vec3(0.102, 0.059, 0.063);
                vec3 col2 = vec3(0.533, 0.243, 0.263); vec3 col3 = vec3(0.769, 0.478, 0.498);
                vec3 color = mix(col0, col1, clamp((f*f)*4.0, 0.0, 1.0));
                color = mix(color, col2, clamp(length(q)*1.2, 0.0, 1.0));
                color = mix(color, col3, clamp(length(r.x)*0.8, 0.0, 1.0));
                color = mix(col0, color, f*1.5);
                color += (random(st * (u_time * 0.1 + 1.0)) - 0.5) * 0.08;
                float edgeMask = smoothstep(1.1, 0.6, max(abs(p.x), abs(p.y)));
                gl_FragColor = vec4(mix(col0, color, edgeMask), 1.0);
            }
        `;
        function initShader(gl, type, src) {
            const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s;
        }
        const prog = gl.createProgram();
        gl.attachShader(prog, initShader(gl, gl.VERTEX_SHADER, vsSource));
        gl.attachShader(prog, initShader(gl, gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(prog);
        const posLoc = gl.getAttribLocation(prog, 'aVertexPosition');
        const resLoc = gl.getUniformLocation(prog, 'u_resolution');
        const timeLoc = gl.getUniformLocation(prog, 'u_time');
        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([1,1,-1,1,1,-1,-1,-1]), gl.STATIC_DRAW);
        function render(t) {
            canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.useProgram(prog);
            gl.enableVertexAttribArray(posLoc);
            gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
            gl.uniform2f(resLoc, canvas.width, canvas.height);
            gl.uniform1f(timeLoc, t * 0.0005);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            if (!window.__PROFILE_STATS_STATIC__) requestAnimationFrame(render);
        }
        if (window.__PROFILE_STATS_STATIC__) {
            render(2400.0);
        } else {
            requestAnimationFrame(render);
        }
    </script>
</body></html>

name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * *"

permissions:
  contents: write

concurrency:
  group: update-profile-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh README stats
        env:
          GH_USERNAME: ${{ vars.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          PROFILE_STATS_WINDOW_DAYS: "7"
          PROFILE_STATS_EXCLUDED_REPOS: ""
        run: python3 scripts/update_profile_stats.py

      - name: Commit README changes
        run: |
          if git diff --quiet README.md; then
            echo "README is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update profile stats"
          git push

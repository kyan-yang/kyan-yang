name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: update-profile-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate workflow configuration
        env:
          GH_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Missing PROFILE_STATS_TOKEN secret."
            echo "::error::Create a fine-grained personal access token that can read the repositories you want counted, then save it as PROFILE_STATS_TOKEN."
            exit 1
          fi

      - name: Refresh README stats
        env:
          GH_USERNAME: ${{ vars.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          PROFILE_STATS_WINDOW_DAYS: "7"
          PROFILE_STATS_EXCLUDED_REPOS: ""
          PYTHONUNBUFFERED: "1"
        run: python3 scripts/update_profile_stats.py --update-readme

      - name: Commit README changes
        run: |
          if git diff --quiet README.md assets/activity-card.svg assets/activity-card-preview.html; then
            echo "README, SVG card, and preview are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/activity-card.svg assets/activity-card-preview.html
          git commit -m "chore: update profile stats"
          git push
